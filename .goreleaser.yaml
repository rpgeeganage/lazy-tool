builds:
  - main: ./cmd/lazy-tool
    binary: lazy-tool-x
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X lazy-tool/internal/version.Version={{.Version}}
      - -X lazy-tool/internal/version.Commit={{.ShortCommit}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
